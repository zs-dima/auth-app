name: rest_client
resolution: workspace

description: Portable HTTP client (ApiClient) with an onion middleware pipeline.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  # Packages
  core_model:
    path: ../core_model

  # Flutter SDK (foundation: compute, kDebugMode, VoidCallback)
  flutter:
    sdk: flutter

  # SDK extensions
  meta: any

  # http
  http: ^1.6.0
  cronet_http: ^1.9.0
  cupertino_http: ^3.0.2

  # Code generation
  json_annotation: ^4.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lints
  lints_tool:
    path: ../../tool/lints_tool

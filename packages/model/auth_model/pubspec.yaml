name: auth_model
resolution: workspace

description: Authentication model

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  # Packages
  core_model:
    path: ../../model/core_model
  grpc_model:
    path: ../../model/grpc_model
  rest_client:
    path: ../../model/rest_client

  # SDK extensions
  meta: any
  uuid: any
  fixnum: any
  crypto: any

  # Internationalization
  intl: any

  # Code generation
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # API
  grpc: ^5.1.0
  protobuf: ^6.0.0

dev_dependencies:
  # Code generation
  build_runner: ^2.15.0
  freezed: ^4.0.0-dev.3
  json_serializable: ^6.14.0

  # Tests
  flutter_test:
    sdk: flutter
  http: ^1.6.0

  # Lints
  lints_tool:
    path: ../../tool/lints_tool
